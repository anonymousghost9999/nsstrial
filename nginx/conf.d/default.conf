server {
    listen 80;
    server_name nss.iiit.ac.in localhost; # Match your actual domain

    client_max_body_size 100M;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # API Proxy
    location /api/ {
        # Note: The trailing slash / here removes /api from the path passed to backend
        # Requests to /api/users -> http://backend-1:8000/users
        proxy_pass http://backend-1:8000/; 
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # HEADERS: Pass through what Host Nginx sent us
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Frontend Proxy
    location / {
        # Note: No trailing slash here is safer for Next.js root
        proxy_pass http://frontend-1:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # HEADERS: Pass through what Host Nginx sent us
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: nss_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M

  # Backend API Service
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://admin:password123@mongodb:27017/nss_db?authSource=admin
      API_ENV: production
      API_PORT: 8000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Frontend Service
  frontend-1:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Since we are using Nginx to route /api, the browser sees relative paths
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend-1
    networks:
      - app-network

  # Nginx Reverse Proxy (Container Layer)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend-1
      - backend-1
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
